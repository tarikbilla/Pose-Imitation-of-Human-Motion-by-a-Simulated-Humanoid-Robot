# Pipeline runtime configuration.
# All keys are optional; defaults live in the Python code.

input:
  # 0 = first webcam on Linux/macOS. Use a file path like "data/sample.mp4" to replay.
  source: 0
  width: 1280
  height: 720
  # Mirror the camera horizontally so the skeleton tracks selfie-style.
  flip_horizontal: true

pose:
  use_mediapipe: true
  # 0 = lite (fastest), 1 = full (balanced), 2 = heavy (most accurate, slowest).
  model_complexity: 1
  # Lowered thresholds for more robust detection in real-time scenarios
  min_detection_confidence: 0.35
  min_tracking_confidence: 0.35
  # MUST be false to enable real human detection via MediaPipe.
  # When true, uses synthetic fallback with fixed landmarks (not tracking humans).
  allow_synthetic_fallback: false

retargeting:
  smoothing_alpha: 0.35

runtime:
  initial_fps: 30
  min_fps: 25
  max_fps: 100
  fps_step: 5
  latency_budget_ms: 150
  max_frames: 0   # 0 = unlimited

webots_bridge:
  enabled: true
  host: 127.0.0.1
  port: 8765

# Real-time walking (Python side: gait-cue extraction + streaming).
# The robot replicates the human's WALK via an on-robot gait engine; it does NOT
# copy raw leg angles (monocular depth is unreliable). The walk TIER (march vs.
# experimental single-support step) is selected controller-side in
# main/controllers/pose_imitation_controller/pose_imitation_controller.py.
walk:
  enabled: true        # stream the gait command in the UDP packet
  cue_window_s: 1.3    # history window for cadence/amplitude (s)
  amp_start: 0.08      # normalized knee-swing amplitude to START marching
  amp_stop: 0.05       # below this -> STOP (hysteresis; bias to standing still)
  cue_conf_min: 0.6    # min visible lower-body fraction to trust a gait reading

logging:
  output_dir: logs
