# Pipeline runtime configuration.
# All keys are optional; defaults live in the Python code.

input:
  # 0 = first webcam on Linux/macOS. Use a file path like "data/sample.mp4" to replay.
  source: 0
  width: 1280
  height: 720
  # Mirror the camera horizontally so the skeleton tracks selfie-style.
  flip_horizontal: true

pose:
  use_mediapipe: true
  # 0 = lite (fastest), 1 = full (balanced), 2 = heavy (most accurate, slowest).
  model_complexity: 1
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  # Set to true ONLY for dev demos without MediaPipe installed.
  # When false, the pipeline fails loudly if MediaPipe cannot load.
  # Temporarily enable synthetic fallback to allow running without MediaPipe.
  allow_synthetic_fallback: true

retargeting:
  smoothing_alpha: 0.35

runtime:
  initial_fps: 30
  min_fps: 25
  max_fps: 100
  fps_step: 5
  latency_budget_ms: 150
  max_frames: 0   # 0 = unlimited

webots_bridge:
  enabled: true
  host: 127.0.0.1
  port: 8765

logging:
  output_dir: logs
